<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>EnClaws</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1040 50%, #0d1b3e 100%);
    color: #fff;
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 28px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 10px; }
  p { font-size: 14px; color: rgba(255,255,255,0.5); }
  .status { margin-top: 24px; font-size: 13px; color: rgba(255,255,255,0.35); }
</style>
</head>
<body>
  <div class="spinner"></div>
  <h1>EnClaws 正在启动...</h1>
  <p>网关启动后将自动跳转控制面板</p>
  <div class="status" id="status">正在连接...</div>
<script>
  // Must match gateway default (see src/gateway/server.impl.ts); keep in sync when default port changes.
  const port = 18888;
  const url = `http://localhost:${port}`;
  let attempts = 0;

  function check() {
    attempts++;
    document.getElementById('status').textContent = `第 ${attempts} 次检测...`;
    fetch(url, { mode: 'no-cors' })
      .then(() => { window.location.href = url; })
      .catch(() => { setTimeout(check, 1500); });
  }

  check();
</script>
</body>
</html>
