name: Build macOS DMG

# 手动触发
on:
  workflow_dispatch:

jobs:
  build-dmg:
    name: Build macOS DMG (${{ matrix.arch }})
    # macOS runner（纯 Node.js 打包，不需要 Xcode/Swift）
    runs-on: macos-15
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]

    steps:
      # 1. 检出代码
      - name: Checkout repository / 检出代码
        uses: actions/checkout@v4

      # 2. 安装 pnpm
      - name: Setup pnpm / 安装 pnpm
        uses: pnpm/action-setup@v4

      # 3. 设置 Node.js 22（用于 pnpm build 和 npm install）
      - name: Setup Node.js 22 / 配置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 4. 赋予脚本执行权限
      - name: Make scripts executable / 赋予脚本执行权限
        run: chmod +x scripts/*.sh

      # 5. 构建自包含 macOS 安装包
      #    - 纯 Node.js，不需要 Swift/Xcode
      #    - 内部自动执行 pnpm install + pnpm build
      #    - 下载对应架构的 Node.js 捆绑进 .app
      #    - 打包 JS 代码 + 依赖 + skills-pack
      #    - 生成 DMG 安装包
      - name: Build macOS installer / 构建 macOS 安装包
        env:
          BUILD_ARCHS: ${{ matrix.arch }}
        run: bash scripts/build-mac-installer.sh

      # 6. 上传 DMG 产物，保留 7 天
      - name: Upload DMG artifact / 上传 DMG 产物
        uses: actions/upload-artifact@v4
        with:
          name: EnClaws-dmg-${{ matrix.arch }}
          path: dist/EnClaws-*-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 7
